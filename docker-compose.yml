services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16
    container_name: tbilisi-dog-map-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tbilisi_dog_map}
      POSTGRES_USER: ${DB_USERNAME:-my_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-my_pass}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - tbilisi_dog_map_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-my_user} -d ${DB_NAME:-tbilisi_dog_map}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tbilisi-dog-map-app
    restart: unless-stopped
    environment:
      PORT: ${APP_PORT:-8080}
      DB_URL: ${DB_URL:-jdbc:postgresql://host.docker.internal:5432/tbilisi_dog_map}
      DB_USERNAME: ${DB_USERNAME:-my_user}
      DB_PASSWORD: ${DB_PASSWORD:-my_pass}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:5500,http://127.0.0.1:5500,https://*.github.io}
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  tbilisi_dog_map_postgres_data:
